<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Log in to Lumen</title>
  <meta name="description" content="Log in to your Lumen account.">

  <!-- Google Fonts: Poppins -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Ambient background: soft morphing gradient blobs, purely decorative -->
  <div class="background-blobs" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <main class="page">
    <div class="login-card" id="loginCard">

      <!-- Brand -->
      <header class="brand">
        <h1 class="brand-name">Lumen</h1>
        <p class="brand-tagline">Welcome back.</p>
      </header>

      <!-- Login form -->
      <form class="login-form" id="loginForm" novalidate>

        <div class="field">
          <input
            type="text"
            id="identifier"
            name="identifier"
            class="field-input"
            placeholder=" "
            autocomplete="username"
            required
          >
          <label for="identifier" class="field-label">Username, email or phone</label>
          <p class="field-error" id="identifierError"></p>
        </div>

        <div class="field">
          <input
            type="password"
            id="password"
            name="password"
            class="field-input field-input--password"
            placeholder=" "
            autocomplete="current-password"
            required
          >
          <label for="password" class="field-label">Password</label>
          <button type="button" class="toggle-password" id="togglePassword" aria-label="Show password">
            <svg class="icon icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg class="icon icon-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.9 21.9 0 0 1 5.06-6.06M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a21.9 21.9 0 0 1-3.22 4.44"/>
              <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
          <p class="field-error" id="passwordError"></p>
        </div>

        <button type="submit" class="btn btn-primary" id="loginBtn">
          <span class="btn-label">Log In</span>
          <span class="btn-spinner" aria-hidden="true"></span>
          <svg class="btn-check" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <polyline class="btn-check-path" points="20 6 9 17 4 12" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></polyline>
          </svg>
        </button>

        <a href="#" class="forgot-link">Forgot password?</a>

      </form>

      <div class="divider"><span>OR</span></div>

      <!-- Social sign-in -->
      <div class="social-buttons">
        <button type="button" class="btn btn-social" id="googleBtn">
          <svg class="social-icon" viewBox="0 0 48 48" aria-hidden="true">
            <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.9-6 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 6.1 29.5 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.2-.1-2.4-.4-3.5z"/>
            <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 16 19 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 6.1 29.5 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
            <path fill="#4CAF50" d="M24 44c5.4 0 10.3-1.9 14-5.4l-6.5-5.5c-2 1.5-4.6 2.4-7.5 2.4-5.3 0-9.7-3.4-11.3-8.1l-6.5 5C9.6 39.6 16.3 44 24 44z"/>
            <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.2-4.2 5.6l6.5 5.5C39.9 37 44 31 44 24c0-1.2-.1-2.4-.4-3.5z"/>
          </svg>
          <span>Continue with Google</span>
        </button>

        <button type="button" class="btn btn-social" id="facebookBtn">
          <svg class="social-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="#1877F2" d="M24 12.07C24 5.4 18.63 0 12 0S0 5.4 0 12.07C0 18.1 4.39 23.09 10.13 24v-8.44H7.08v-3.49h3.05V9.41c0-3.02 1.79-4.7 4.53-4.7 1.31 0 2.68.24 2.68.24v2.97h-1.51c-1.49 0-1.96.93-1.96 1.89v2.26h3.33l-.53 3.49h-2.8V24C19.61 23.09 24 18.1 24 12.07z"/>
          </svg>
          <span>Continue with Facebook</span>
        </button>
      </div>

      <!-- Sign up -->
      <footer class="signup">
        <p>Don't have an account? <a href="#" class="signup-link">Sign up</a></p>
      </footer>

    </div>
  </main>

  <!-- Toast notification -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="script.js"></script>
</body>
</html>
